name: build-test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'
          cache: true

      - name: Restore
        run: dotnet restore TextTool.sln

      - name: Build
        run: dotnet build TextTool.sln -c Release --no-restore

      - name: Test
        run: dotnet test TextTool.Tests/TextTool.Tests.csproj -c Release --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.ref_name }}
          path: TextTool.Tests/TestResults/**/coverage.cobertura.xml

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet publish TextTool/TextTool.csproj -c Release -r win-x64 -o publish/TextTool
          echo "::notice::Published to publish/TextTool"

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: TextTool-${{ github.ref_name }}
          path: publish/TextTool/
